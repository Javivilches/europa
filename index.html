<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulador descenso</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    margin:0;
    font-family: 'Inter', sans-serif;
    background: url('fondo.jpg') no-repeat center center fixed;
    background-size: cover;
    color:white;
}

body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(2,6,23,0.75);
    z-index:-1;
}

/* HEADER */
h1{
    text-align:center;
    padding:20px;
    margin:0;
    font-size:26px;
    font-weight:700;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:12px;
}

h1 img{
    height:34px;
}

/* LAYOUT */
.container{
    display:flex;
    justify-content:center;
    gap:25px;
    padding:20px;
}

/* TARJETAS */
.card{
    background: rgba(15, 23, 42, 0.85);
    border-radius:16px;
    padding:18px;
    backdrop-filter: blur(8px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.7);
    border:1px solid rgba(255,255,255,0.05);
}

/* IZQ */
.izq{ width:400px; }

/* DER */
.der{ width:330px; }

/* NAV */
.nav{
    text-align:center;
    margin-bottom:12px;
}

.nav span{
    padding:6px 12px;
    margin:3px;
    cursor:pointer;
    border-radius:8px;
    background:#1e293b;
    font-weight:600;
    transition:0.2s;
}

.activa{
    background:#ef4444;
    box-shadow:0 0 10px rgba(239,68,68,0.7);
}

/* TITULOS */
.titulo{
    font-size:18px;
    text-align:center;
    font-weight:700;
    letter-spacing:1px;
    margin-bottom:12px;
}

/* PARTIDOS */
.partido{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:10px 0;
    font-size:15px;
    font-weight:600;
}

.equipo{
    width:140px;
    display:flex;
    align-items:center;
    gap:12px;
}

/* ESCUDOS JORNADAS (igual) */
.equipo img{
    width:34px;
    height:34px;
}

/* MARCADOR */
.marcador{
    display:flex;
    gap:8px;
    align-items:center;
}

input{
    width:40px;
    height:36px;
    text-align:center;
    border-radius:10px;
    border:none;
    background:#020617;
    color:white;
    font-weight:700;
}

/* TABLA */
.fila{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    font-size:15px;
    border-bottom:1px solid rgba(255,255,255,0.05);
}

.fila span{
    display:flex;
    align-items:center;
    gap:12px;
}

/* 🔥 ESCUDOS MÁS GRANDES EN CLASIFICACIÓN */
.fila img{
    width:34px;
    height:34px;
}

.cabecera{
    font-weight:700;
    border-bottom:1px solid #334155;
    padding-bottom:8px;
    margin-bottom:8px;
}

.descenso{
    color:#ff4d4d;
    font-weight:700;
}

/* NOTAS FUERA */
.notas{
    max-width:900px;
    margin:10px auto 30px auto;
    text-align:center;
    font-size:13px;
    color:#cbd5f5;
    opacity:0.85;
    line-height:1.6;
}

/* 📱 MÓVIL */
@media (max-width: 768px){

    .container{
        flex-direction: column;
        align-items: center;
        padding:10px;
    }

    .izq, .der{
        width:100%;
        max-width:420px;
    }

    h1{
        font-size:20px;
        flex-direction: column;
        gap:5px;
    }

    h1 img{
        height:26px;
    }

    /* NAV más compacta */
    .nav span{
        padding:6px 10px;
        font-size:14px;
    }

    /* PARTIDOS */
   .partido{
    font-size:13px;
    margin:8px 0;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.marcador{
    flex:0 0 auto;
    display:flex;
    justify-content:center;
    align-items:center;
    gap:6px;
}

.equipo{
    flex:1;
    display:flex;
    align-items:center;
}

.equipo:first-child{
    justify-content:flex-start;
}

.equipo:last-child{
    justify-content:flex-end;
}

    .equipo{
        width:auto;
        font-size:13px;
    }

    .equipo img{
        width:26px;
        height:26px;
    }

    /* INPUTS más táctiles */
    input{
        width:42px;
        height:38px;
        font-size:16px;
    }

    /* CLASIFICACIÓN */
    .fila{
        font-size:14px;
        padding:8px 0;
    }

    .fila img{
        width:28px;
        height:28px;
    }

    /* NOTAS */
    .notas{
        font-size:12px;
        padding:0 10px;
    }
}
</style>
</head>

<body>

<h1>
SIMULADOR DESCENSO
<img src="laliga.png">
</h1>

<div class="container">

<div class="card izq">
<div class="nav" id="nav"></div>
<div class="titulo" id="tituloJornada"></div>
<div id="partidos"></div>
</div>

<div class="card der">
<div class="titulo">🏆 CLASIFICACIÓN</div>

<div class="fila cabecera">
<span>Equipo</span>
<span>Pts</span>
</div>

<div id="tabla"></div>
</div>

</div>

<!-- 🔥 NOTAS FUERA -->
<div class="notas">
* Introduce los resultados y se actualizará la clasificación automáticamente<br>
* Clasificación calculada teniendo en cuenta los enfrentamientos directos entre equipos en caso de empate a puntos.
</div>

<script>

const base = {
"OVIEDO":28,"LEVANTE":33,"SEVILLA":34,"MALLORCA":35,
"ALAVÉS":36,"GIRONA":38,"ESPANYOL":39,"ELCHE":38,
"VALENCIA":39,"RAYO":39
};

const jornadas = {
34:[["BETIS","OVIEDO"],["VILLARREAL","LEVANTE"],["SEVILLA","R.SOCIEDAD"],["GIRONA","MALLORCA"],["ALAVÉS","ATHLETIC"],["ESPANYOL","R.MADRID"],["CELTA","ELCHE"],["VALENCIA","ATLÉTICO"],["GETAFE","RAYO"]],
35:[["OVIEDO","GETAFE"],["LEVANTE","OSASUNA"],["SEVILLA","ESPANYOL"],["MALLORCA","VILLARREAL"],["ELCHE","ALAVÉS"],["RAYO","GIRONA"],["ATHLETIC","VALENCIA"]],
36:[["R.MADRID","OVIEDO"],["CELTA","LEVANTE"],["VILLARREAL","SEVILLA"],["GETAFE","MALLORCA"],["ALAVÉS","BARCELONA"],["GIRONA","R.SOCIEDAD"],["ESPANYOL","ATHLETIC"],["BETIS","ELCHE"],["VALENCIA","RAYO"]],
37:[["OVIEDO","ALAVÉS"],["LEVANTE","MALLORCA"],["SEVILLA","R.MADRID"],["ATLÉTICO","GIRONA"],["OSASUNA","ESPANYOL"],["ELCHE","GETAFE"],["R.SOCIEDAD","VALENCIA"],["RAYO","VILLARREAL"]],
38:[["MALLORCA","OVIEDO"],["BETIS","LEVANTE"],["CELTA","SEVILLA"],["ALAVÉS","RAYO"],["GIRONA","ELCHE"],["ESPANYOL","R.SOCIEDAD"],["VALENCIA","BARCELONA"]]
};

const enfrentamientosDirectos = [
["ESPANYOL","RAYO",1,0],
["RAYO","ESPANYOL",1,0],
["ESPANYOL","VALENCIA",2,2],
["VALENCIA","ESPANYOL",3,2],
["OVIEDO","ESPANYOL",0,2],
["ESPANYOL","OVIEDO",1,1],
["ESPANYOL","ELCHE",1,0],
["ELCHE","ESPANYOL",2,2],
["LEVANTE","ESPANYOL",1,1],
["ESPANYOL","LEVANTE",0,0],
["ESPANYOL","SEVILLA",2,1],
["ESPANYOL","MALLORCA",3,2],
["MALLORCA","ESPANYOL",2,1],
["ALAVÉS","ESPANYOL",2,1],
["ESPANYOL","ALAVÉS",1,2],
["GIRONA","ESPANYOL",0,0],
["ESPANYOL","GIRONA",0,2],
["RAYO","VALENCIA",1,1],
["OVIEDO","RAYO",0,0],
["RAYO","OVIEDO",3,0],
["ELCHE","RAYO",4,0],
["RAYO","ELCHE",1,0],
["LEVANTE","RAYO",0,3],
["RAYO","LEVANTE",1,1],
["RAYO","SEVILLA",0,1],
["SEVILLA","RAYO",1,1],
["RAYO","MALLORCA",2,1],
["MALLORCA","RAYO",3,0],
["RAYO","ALAVÉS",1,0],
["GIRONA","RAYO",1,3],
["VALENCIA","OVIEDO",1,2],
["OVIEDO","VALENCIA",1,0],
["VALENCIA","ELCHE",1,1],
["ELCHE","VALENCIA",1,0],
["VALENCIA","LEVANTE",1,0],
["LEVANTE","VALENCIA",0,2],
["VALENCIA","SEVILLA",1,1],
["SEVILLA","VALENCIA",0,2],
["VALENCIA","MALLORCA",1,1],
["MALLORCA","VALENCIA",1,1],
["ALAVÉS","VALENCIA",0,0],
["VALENCIA","ALAVÉS",3,2],
["GIRONA","VALENCIA",2,1],
["VALENCIA","GIRONA",2,1],
["ELCHE","OVIEDO",1,0],
["OVIEDO","ELCHE",1,2],
["OVIEDO","LEVANTE",0,2],
["LEVANTE","OVIEDO",4,2],
["SEVILLA","OVIEDO",4,0],
["OVIEDO","SEVILLA",1,0],
["OVIEDO","MALLORCA",0,0],
["ALAVÉS","OVIEDO",1,1],
["GIRONA","OVIEDO",3,3],
["OVIEDO","GIRONA",1,0],
["ELCHE","LEVANTE",2,0],
["LEVANTE","ELCHE",3,2],
["SEVILLA","ELCHE",2,2],
["ELCHE","SEVILLA",2,2],
["MALLORCA","ELCHE",3,1],
["ELCHE","MALLORCA",2,1],
["ALAVÉS","ELCHE",3,1],
["ELCHE","GIRONA",3,0],
["SEVILLA","LEVANTE",0,3],
["LEVANTE","SEVILLA",2,0],
["MALLORCA","LEVANTE",1,1],
["ALAVÉS","LEVANTE",2,1],
["LEVANTE","ALAVÉS",2,0],
["GIRONA","LEVANTE",0,4],
["LEVANTE","GIRONA",1,1],
["SEVILLA","MALLORCA",1,3],
["MALLORCA","SEVILLA",4,1],
["ALAVÉS","SEVILLA",1,2],
["SEVILLA","ALAVÉS",1,1],
["GIRONA","SEVILLA",0,2],
["SEVILLA","GIRONA",1,1],
["MALLORCA","ALAVÉS",1,0],
["ALAVÉS","MALLORCA",2,1],
["MALLORCA","GIRONA",1,2],
["GIRONA","ALAVÉS",1,0],
["ALAVÉS","GIRONA",2,2]
];

let jornadaActual = 34;
let resultados = {};
resultados["34-3"] = {gl:0, gv:1};
resultados["34-1"] = {gl:5, gv:1};

function escudo(nombre){
    return `<img src="escudos/${nombre.toLowerCase()}.png">`;
}

function renderNav(){
    let html="";
    Object.keys(jornadas).forEach(j=>{
        html+=`<span onclick="cambiar(${j})" class="${j==jornadaActual?'activa':''}">${j}</span>`;
    });
    document.getElementById("nav").innerHTML=html;
}

function renderPartidos(){
    let lista = jornadas[jornadaActual];
    document.getElementById("tituloJornada").innerText="📅 Jornada "+jornadaActual;

    let html="";
    lista.forEach((p,i)=>{
        let key=jornadaActual+"-"+i;
        let gl=resultados[key]?.gl??"";
        let gv=resultados[key]?.gv??"";

        html+=`
        <div class="partido">
            <span class="equipo">${escudo(p[0])}${p[0]}</span>

            <div class="marcador">
               ${(jornadaActual==34 && i==3) ? `
    <input value="0" disabled>
    -
    <input value="1" disabled>
` : (jornadaActual==34 && i==1) ? `
    <input value="5" disabled>
    -
    <input value="1" disabled>
` : `
    <input value="${gl}" oninput="guardar(${jornadaActual},${i},this.value,null)">
    -
    <input value="${gv}" oninput="guardar(${jornadaActual},${i},null,this.value)">
`}
            </div>

            <span class="equipo" style="justify-content:flex-end">${p[1]}${escudo(p[1])}</span>
        </div>`;
    });

    document.getElementById("partidos").innerHTML=html;
}

function guardar(j,i,gl,gv){
    let key=j+"-"+i;
    if(!resultados[key]) resultados[key]={};

    if(gl!==null) resultados[key].gl=parseInt(gl);
    if(gv!==null) resultados[key].gv=parseInt(gv);

    calcular();
}

function cambiar(j){
    jornadaActual=j;
    renderNav();
    renderPartidos();
}
function calcularMiniliga(equipos){

    let datos = {};

    equipos.forEach(e=>{
        datos[e]={pts:0, dg:0, gf:0};
    });

    function procesar(local, visitante, gl, gv){
        if(!equipos.includes(local) || !equipos.includes(visitante)) return;

        if(gl>gv) datos[local].pts+=3;
        else if(gv>gl) datos[visitante].pts+=3;
        else{
            datos[local].pts+=1;
            datos[visitante].pts+=1;
        }

        datos[local].dg += gl-gv;
        datos[visitante].dg += gv-gl;

        datos[local].gf += gl;
        datos[visitante].gf += gv;
    }

    enfrentamientosDirectos.forEach(p=>{
        procesar(p[0],p[1],p[2],p[3]);
    });

    Object.entries(resultados).forEach(([k,r])=>{
        if(isNaN(r.gl)||isNaN(r.gv)) return;

        let [j,i]=k.split("-");
        let p=jornadas[j][i];

        procesar(p[0],p[1],r.gl,r.gv);
    });

    return datos;
}

function calcular(){

    let puntos={...base};

    Object.entries(resultados).forEach(([k,r])=>{
        if(isNaN(r.gl)||isNaN(r.gv)) return;

        let [j,i]=k.split("-");
        let p=jornadas[j][i];

        if(r.gl>r.gv){
            if(puntos[p[0]]!==undefined) puntos[p[0]]+=3;
        }else if(r.gv>r.gl){
            if(puntos[p[1]]!==undefined) puntos[p[1]]+=3;
        }else{
            if(puntos[p[0]]!==undefined) puntos[p[0]]+=1;
            if(puntos[p[1]]!==undefined) puntos[p[1]]+=1;
        }
    });

    let tabla=Object.entries(puntos)
        .map(([e,p])=>({e,p}))
        
// ordenar por puntos
tabla.sort((a,b)=>b.p-a.p);

// resolver empates
let final = [];

let i=0;

while(i < tabla.length){

    let grupo = [tabla[i]];
    let j=i+1;

    while(j < tabla.length && tabla[j].p === tabla[i].p){
        grupo.push(tabla[j]);
        j++;
    }

    if(grupo.length > 1){

        let equipos = grupo.map(t=>t.e);
        let mini = calcularMiniliga(equipos);

        grupo.sort((a,b)=>{
            let A = mini[a.e];
            let B = mini[b.e];

            if(B.pts !== A.pts) return B.pts - A.pts;
            if(B.dg !== A.dg) return B.dg - A.dg;
            if(B.gf !== A.gf) return B.gf - A.gf;

            return 0;
        });
    }

    final.push(...grupo);
    i=j;
}

    let html="";

    final.forEach((t,i)=>{
        html+=`
        <div class="fila ${i>=7?'descenso':''}">
            <span>${i+11}. ${escudo(t.e)} ${t.e}</span>
            <span>${t.p}</span>
        </div>`;
    });

    document.getElementById("tabla").innerHTML=html;
}

renderNav();
renderPartidos();
calcular();

</script>

</body>
</html>
